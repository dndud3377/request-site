services:
  db:
    image: ${CONTAINER_IMAGE}
    container_name: ${CONTAINER_DB}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        IMAGE_PATH: ${IMAGE_PATH}
        PIP_INDEX_URL: ${PIP_INDEX_URL}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST}
        BIGDATA_INDEX_URL: ${BIGDATA_INDEX_URL}
        BIGDATA_TRUSTED_HOST: ${BIGDATA_TRUSTED_HOST}
        ODBC_DRIVER_URL: ${ODBC_DRIVER_URL}
        ODBC_DRIVER_FILENAME: ${ODBC_DRIVER_FILENAME}
    image: request-site-backend:latest
    container_name: request_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - MYSQL_HOST=db
      - SKIP_SCHEDULER=false
      # ODBC 설정
      - ODBC_HOST=${ODBC_HOST}
      - ODBC_PORT=${ODBC_PORT}
      - ODBC_DATABASE=${ODBC_DATABASE}
      - ODBC_AUTH_MECH=${ODBC_AUTH_MECH}
      - ODBC_USE_SASL=${ODBC_USE_SASL}
      - ODBC_UID=${ODBC_UID}
      - ODBC_PWD=${ODBC_PWD}
      - ODBC_KRB_FQDN=${ODBC_KRB_FQDN}
      - ODBC_KRB_REALM=${ODBC_KRB_REALM}
      - ODBC_KRB_SERVICE_NAME=${ODBC_KRB_SERVICE_NAME}
      - ODBC_SSL=${ODBC_SSL}
      - ODBC_TSASL_BUFFER_SIZE=${ODBC_TSASL_BUFFER_SIZE}
      - ODBC_ROWS_PER_BLOCK=${ODBC_ROWS_PER_BLOCK}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py create_users &&
             python manage.py seed_lines &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --worker-class gthread --workers 2 --threads 10 --timeout 120"

  # 스케줄러 전용 단일 프로세스. 웹(gunicorn) 워커는 스케줄러를 기동하지 않으며,
  # APScheduler 동기화/메일 큐 잡은 이 컨테이너 하나에서만 실행된다.
  scheduler:
    image: request-site-backend:latest
    container_name: request_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - MYSQL_HOST=db
      - SKIP_SCHEDULER=false
      # ODBC 설정 (DCQ/Impala 조회에 필요 - 웹과 동일)
      - ODBC_HOST=${ODBC_HOST}
      - ODBC_PORT=${ODBC_PORT}
      - ODBC_DATABASE=${ODBC_DATABASE}
      - ODBC_AUTH_MECH=${ODBC_AUTH_MECH}
      - ODBC_USE_SASL=${ODBC_USE_SASL}
      - ODBC_UID=${ODBC_UID}
      - ODBC_PWD=${ODBC_PWD}
      - ODBC_KRB_FQDN=${ODBC_KRB_FQDN}
      - ODBC_KRB_REALM=${ODBC_KRB_REALM}
      - ODBC_KRB_SERVICE_NAME=${ODBC_KRB_SERVICE_NAME}
      - ODBC_SSL=${ODBC_SSL}
      - ODBC_TSASL_BUFFER_SIZE=${ODBC_TSASL_BUFFER_SIZE}
      - ODBC_ROWS_PER_BLOCK=${ODBC_ROWS_PER_BLOCK}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    # 마이그레이션/시드/정적파일은 backend 가 담당한다. 여기서는 DB 대기 후 스케줄러만 실행.
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py run_scheduler"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        IMAGE_PATH: ${IMAGE_PATH}
        NPM_REGISTRY_URL: ${NPM_REGISTRY_URL}
    container_name: request_frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        IMAGE_PATH: ${IMAGE_PATH}
    container_name: request_nginx
    restart: unless-stopped
    ports:
      - "10010:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - static_data:/var/www/static
      - media_data:/var/www/media
    depends_on:
      - backend
      - frontend

volumes:
  mysql_data:
    driver: local
  media_data:
    driver: local
  static_data:
    driver: local
