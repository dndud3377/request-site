version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: request_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-requestdb}
      MYSQL_USER: ${MYSQL_USER:-requestuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-requestpass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-requestuser}", "-p${MYSQL_PASSWORD:-requestpass}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: request_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - MYSQL_HOST=db
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py create_users &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: request_frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: request_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_data:/var/www/static
      - media_data:/var/www/media
    depends_on:
      - backend
      - frontend

volumes:
  mysql_data:
    driver: local
  media_data:
    driver: local
  static_data:
    driver: local
