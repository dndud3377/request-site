services:
  db:
    image: ${CONTAINER_IMAGE}
    container_name: request_db_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./mysql/my.dev.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-sync:
    image: ${CONTAINER_IMAGE}
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "
        echo '[DB Sync] Creating dev DB if not exists...';
        mysql -h $$MYSQL_HOST -u $$MYSQL_USER -p$$MYSQL_PASSWORD
          -e 'CREATE DATABASE IF NOT EXISTS \`'$$MYSQL_DB'\`
              CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;';
        if [ \"$$SKIP_DB_SYNC\" = 'true' ]; then
          echo '[DB Sync] Data sync skipped (SKIP_DB_SYNC=true)';
          exit 0;
        fi;
        echo '[DB Sync] Copying prod → dev...';
        set -eo pipefail;
        mysqldump -h $$PROD_MYSQL_HOST -u $$MYSQL_USER -p$$MYSQL_PASSWORD
          --single-transaction --skip-lock-tables $$PROD_MYSQL_DB |
          mysql -h $$MYSQL_HOST -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DB;
        echo '[DB Sync] Done.';
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        IMAGE_PATH: ${IMAGE_PATH}
        PIP_INDEX_URL: ${PIP_INDEX_URL}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST}
        BIGDATA_INDEX_URL: ${BIGDATA_INDEX_URL}
        BIGDATA_TRUSTED_HOST: ${BIGDATA_TRUSTED_HOST}
        ODBC_DRIVER_URL: ${ODBC_DRIVER_URL}
        ODBC_DRIVER_FILENAME: ${ODBC_DRIVER_FILENAME}
    image: request-site-backend-dev:latest
    container_name: request_backend_dev
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - AUTH_MODE=dev
      - DEBUG=True
      - SKIP_SCHEDULER=true
    volumes:
      - ./backend:/app
    depends_on:
      db-sync:
        condition: service_completed_successfully
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate --noinput &&
             python manage.py create_users &&
             python manage.py seed_lines &&
             python manage.py runserver 0.0.0.0:8000"

  # dev 스케줄러 전용 단일 프로세스. dev 는 SKIP_SCHEDULER=true 이므로
  # 무거운 DCQ/RTDB 동기화는 건너뛰고 결재 알림 메일 큐 발송만 실행한다.
  scheduler:
    image: request-site-backend-dev:latest
    container_name: request_scheduler_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - SKIP_SCHEDULER=true
    volumes:
      - ./backend:/app
    depends_on:
      db-sync:
        condition: service_completed_successfully
      backend:
        condition: service_started
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py run_scheduler"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        IMAGE_PATH: ${IMAGE_PATH}
        NPM_REGISTRY_URL: ${NPM_REGISTRY_URL}
        REACT_APP_AUTH_MODE: "dev"
    container_name: request_frontend_dev
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        IMAGE_PATH: ${IMAGE_PATH}
    container_name: request_nginx_dev
    restart: unless-stopped
    ports:
      - "10011:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend

volumes:
  mysql_dev_data:

networks:
  default: {}
